name: CI

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Koka (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -sSL https://github.com/koka-lang/koka/releases/latest/download/install.sh | sudo sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Koka (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -sSL -o "$env:TEMP\install-koka.bat" https://github.com/koka-lang/koka/releases/latest/download/install.bat
          & "$env:TEMP\install-koka.bat"
          "$env:LOCALAPPDATA\koka\bin" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Install hica (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -fsSL https://www.hica.dev/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install hica (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          curl -fsSL -o "$env:TEMP\install-hica.ps1" https://www.hica.dev/install.ps1
          & "$env:TEMP\install-hica.ps1"
          "$env:LOCALAPPDATA\hica" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Verify tools
        run: |
          koka --version
          hica --version
        shell: bash

      - name: Install libcurl and libmicrohttpd (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libmicrohttpd-dev

      - name: Install libmicrohttpd (macOS)
        if: runner.os == 'macOS'
        run: brew install libmicrohttpd

      - name: Run unit tests
        shell: bash
        continue-on-error: ${{ runner.os == 'Windows' }}
        run: |
          set +e
          failed=0
          ran=0
          for f in tests/test_*.hc; do
            [ -e "$f" ] || continue
            ran=$((ran + 1))
            echo "=== $f ==="
            output=$(hica test "$f" 2>&1)
            echo "$output"
            if echo "$output" | grep -q 'failed'; then
              failed=1
            fi
          done
          if [ "$ran" -eq 0 ]; then
            echo "error: no test files matched tests/test_*.hc"
            failed=1
          fi
          exit $failed

      - name: Build client example (libcurl FFI)
        shell: bash
        continue-on-error: ${{ runner.os == 'Windows' }}
        run: |
          set -e
          hica build examples/basic.hc -o http_example
          echo "client example built and linked against libcurl OK"

      - name: Build server example (libmicrohttpd FFI)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          hica build examples/server.hc -o http_server_example
          echo "server example built and linked against libmicrohttpd OK"

      - name: Build router example (router + json + libmicrohttpd)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          hica fetch
          hica build examples/server_router.hc -o http_router_example
          echo "router example built (router + json + libmicrohttpd) OK"

      - name: Build typed-body example (router + json decode + libmicrohttpd)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          hica build examples/server_typed.hc -o http_typed_example
          echo "typed-body example built (router + json decode + libmicrohttpd) OK"

      - name: Build middleware example (router + middleware + libmicrohttpd)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -e
          hica build examples/server_middleware.hc -o http_middleware_example
          echo "middleware example built (router + middleware + libmicrohttpd) OK"

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
